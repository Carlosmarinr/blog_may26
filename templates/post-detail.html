{% extends '_base.html' %}

{% block content %}
    <h2>{{ blog.title }}</h2>
    <p><strong>Author:</strong> {{ blog.author }}</p>
    <p><strong>Created at:</strong> {{ blog.created_at }}</p>
    <div>
        {{ blog.content }}
    </div>
    <a href="{% url 'post-update' blog.pk %}">Editar Publicación</a>
    <a href="{% url 'post-delete' blog.pk %}">Eliminar Publicación</a>
{% endblock %}
