{% extends "_base.html" %}

{% block content %}
    <h2>Eliminar Publicación</h2>
    <p>¿Estás seguro de que deseas eliminar esta publicación "{{ blog.title }}"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Sí, eliminar</button>
        <a href="{% url 'post-detail' blog.pk %}">No, volver</a>
    </form>
{% endblock %}
